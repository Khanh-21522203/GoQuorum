version: '3.8'

services:
  node1:
    build: .
    container_name: goquorum-node1
    hostname: node1
    ports:
      - "7071:7070"
      - "8081:8080"
    volumes:
      - ./data/node1:/var/lib/goquorum
      - ./config/cluster-node1.yaml:/etc/goquorum/config.yaml:ro
    environment:
      - GOQUORUM_NODE_ID=node1
    networks:
      - goquorum-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  node2:
    build: .
    container_name: goquorum-node2
    hostname: node2
    ports:
      - "7072:7070"
      - "8082:8080"
    volumes:
      - ./data/node2:/var/lib/goquorum
      - ./config/cluster-node2.yaml:/etc/goquorum/config.yaml:ro
    environment:
      - GOQUORUM_NODE_ID=node2
    networks:
      - goquorum-net
    depends_on:
      - node1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  node3:
    build: .
    container_name: goquorum-node3
    hostname: node3
    ports:
      - "7073:7070"
      - "8083:8080"
    volumes:
      - ./data/node3:/var/lib/goquorum
      - ./config/cluster-node3.yaml:/etc/goquorum/config.yaml:ro
    environment:
      - GOQUORUM_NODE_ID=node3
    networks:
      - goquorum-net
    depends_on:
      - node1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: goquorum-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    networks:
      - goquorum-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  loki:
    image: grafana/loki:2.9.0
    container_name: goquorum-loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki.yaml:/etc/loki/local-config.yaml:ro
      - ./data/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - goquorum-net

  promtail:
    image: grafana/promtail:2.9.0
    container_name: goquorum-promtail
    volumes:
      - ./config/promtail.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - goquorum-net
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.0.0
    container_name: goquorum-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - goquorum-net
    depends_on:
      - prometheus
      - loki

networks:
  goquorum-net:
    driver: bridge
